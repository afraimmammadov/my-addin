<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qonaq Buraxılışı — Forma 1</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root{--dark:#1a1a2e;--accent:#0078d4;--accent-h:#106ebe;--ok:#107c10;--bg:#f4f5f7;--card:#fff;--bdr:#e1e4e8;--txt:#24292e;--txt2:#586069;--err:#d13438}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--txt);background:var(--bg);overflow:hidden}
    .hdr{background:var(--dark);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px}
    .hdr-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .hdr h1{font-size:13.5px;font-weight:700}
    .mbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:9px 16px;display:flex;gap:16px;font-size:11.5px}
    .lbl{font-size:9.5px;text-transform:uppercase;color:var(--txt2);font-weight:700;display:block}
    .wrap{padding:14px 16px; height: calc(100vh - 100px); overflow-y: auto;}
    .stitle{font-size:11.5px;font-weight:700;color:var(--dark);margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--accent);display:inline-block}
    .att-row{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:3px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;cursor:pointer}
    .att-row.sel{background:rgba(0,120,212,.05);border-color:var(--accent)}
    .gcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px;margin-bottom:7px}
    .fg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
    .fg label{font-size:10px;font-weight:600;color:var(--txt2)}
    .fg input{border:1px solid var(--bdr);border-radius:5px;padding:6px 8px;font-size:12px;width:100%}
    .btn{padding:10px 16px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;width:100%}
    .btn-p{background:var(--accent);color:#fff}
    .btn-p:disabled{background:#ccc;cursor:not-allowed}
    .preview-box{background:#fff;border:1px solid var(--bdr);padding:10px;font-size:10px}
    .preview-box table{width:100%;border-collapse:collapse}
    .preview-box th,.preview-box td{border:1px solid #000;padding:4px}
    .hidden{display:none !important}
    .loader-box{text-align:center;padding:40px 20px}
    .spinner{width:30px;height:30px;border:3px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="hdr"><div class="hdr-icon">&#x1F3E2;</div><div><h1>Qonaq Buraxılışı</h1></div></div>
  
  <div id="loading" class="loader-box">
    <div class="spinner"></div>
    <p>Outlook məlumatları yüklənir...</p>
  </div>

  <div id="mainContent" class="hidden">
    <div class="mbar">
        <div><span class="lbl">Görüş</span><b id="mSubject">...</b></div>
        <div><span class="lbl">Tarix</span><b id="mDate">...</b></div>
    </div>

    <div class="wrap">
        <div id="step1">
            <div class="stitle">Qonaqları seçin</div>
            <div id="attList"></div>
            <button class="btn btn-p" style="margin-top:10px" onclick="goStep2()">Davam et &#8594;</button>
        </div>

        <div id="step2" class="hidden">
            <div class="stitle">Detallar</div>
            <div id="guestDetails"></div>
            <div class="fg"><label>Məqsəd</label><input id="fPurpose" value="Layihə ilə əlaqədar"/></div>
            <div class="fg"><label>Məkan</label><input id="fLocation" value="SOCAR Tower / 25-ci mərtəbə"/></div>
            <div class="fg"><label>Müddət</label><input id="fPeriod"/></div>
            <div class="fg"><label>Bölmə</label><input id="fDept"/></div>
            <div class="fg"><label>Daxili No</label><input id="fExt"/></div>
            <div style="display:flex; gap:8px">
                <button class="btn" onclick="goStep1()">Geri</button>
                <button class="btn btn-p" onclick="goStep3()">Önizləmə</button>
            </div>
        </div>

        <div id="step3" class="hidden">
            <div class="stitle">Önizləmə</div>
            <div id="previewDoc" class="preview-box"></div>
            <button class="btn btn-p" style="margin-top:15px" onclick="finishAll()">Göndər və Yüklə</button>
            <button class="btn" style="margin-top:5px" onclick="goStep2()">Geri</button>
        </div>
    </div>
  </div>

<script>
var attendees = [];
var selectedIds = new Set();
var meeting = { subject:'', organizer:'' };

Office.onReady(function(info) {
    if (info.host === Office.HostType.Outlook) {
        initApp();
    }
});

async function initApp() {
    const item = Office.context.mailbox.item;
    
    // Məlumatları asinxron yığırıq
    const getSubject = () => new Promise(res => item.subject.getAsync(r => res(r.value)));
    const getStart = () => new Promise(res => item.start.getAsync(r => res(r.value)));
    const getEnd = () => new Promise(res => item.end.getAsync(r => res(r.value)));
    const getReq = () => new Promise(res => item.requiredAttendees.getAsync(r => res(r.value || [])));
    const getOpt = () => new Promise(res => item.optionalAttendees.getAsync(r => res(r.value || [])));

    meeting.subject = await getSubject();
    const start = await getStart();
    const end = await getEnd();
    const req = await getReq();
    const opt = await getOpt();

    document.getElementById('mSubject').innerText = meeting.subject;
    document.getElementById('mDate').innerText = start.toLocaleDateString('az-AZ');
    document.getElementById('fPeriod').value = start.getDate() + " " + ["yan","fev","mar","apr","may","iyn","iyl","avq","sen","okt","noy","dek"][start.getMonth()];

    const all = [...req, ...opt];
    all.forEach(a => {
        attendees.push({
            id: "id_" + Math.random().toString(36).substr(2,7),
            name: a.displayName,
            email: a.emailAddress,
            company: a.emailAddress.includes('socar') ? 'SOCAR' : ''
        });
    });

    const user = Office.context.mailbox.userProfile;
    meeting.organizer = user.displayName;
    
    // Hər şey hazır olanda göstər
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    renderAttList();
}

function renderAttList() {
    let h = '';
    attendees.forEach(a => {
        h += `<div class="att-row ${selectedIds.has(a.id)?'sel':''}" onclick="toggleAtt('${a.id}')">
            <input type="checkbox" ${selectedIds.has(a.id)?'checked':''}>
            <div><b>${a.name}</b><br/><small>${a.company || 'Xarici'}</small></div>
        </div>`;
    });
    document.getElementById('attList').innerHTML = h || 'Qonaq tapılmadı.';
}

function toggleAtt(id) {
    if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    renderAttList();
}

function goStep1() { switchStep('step1'); }
function goStep2() { 
    let h = '';
    attendees.filter(a => selectedIds.has(a.id)).forEach(a => {
        h += `<div class="gcard"><b>${a.name}</b>
              <input class="fg" style="margin-top:5px; padding:4px" placeholder="Şirkət" value="${a.company}" onchange="updateComp('${a.id}', this.value)"></div>`;
    });
    document.getElementById('guestDetails').innerHTML = h;
    switchStep('step2'); 
}
function goStep3() {
    let sel = attendees.filter(a => selectedIds.has(a.id));
    let h = `<table><tr><th>Ad</th><th>Şirkət</th></tr>`;
    sel.forEach(s => h += `<tr><td>${s.name}</td><td>${s.company}</td></tr>`);
    h += `</table>`;
    document.getElementById('previewDoc').innerHTML = h;
    switchStep('step3');
}

function switchStep(id) {
    ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function updateComp(id, v) {
    let a = attendees.find(x => x.id === id);
    if(a) a.company = v;
}

function finishAll() {
    // Burada sizin əvvəlki Word generation və Email açma kodunuz işləyəcək
    alert("Email hazırlanır və fayl yüklənir...");
    // Qeyd: Əvvəlki MiniZip və generateDocx funksiyalarını bura daxil etmədim ki, kod çox uzun olmasın. 
    // Amma məntiq eynidir.
}
</script>
</body>
</html>
