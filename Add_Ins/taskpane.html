<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    /* Stil bölməsi eyni qalır, yalnız bəzi xırda vizual toxunuşlar */
    :root{--dark:#1a1a2e;--accent:#0078d4;--bg:#f4f5f7;--card:#fff;--bdr:#e1e4e8;--txt:#24292e;--txt2:#586069}
    body{font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--txt);background:var(--bg);margin:0;padding:0}
    .hdr{background:var(--dark);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
    .wrap{padding:14px 16px}
    .stitle{font-size:11.5px;font-weight:700;color:var(--dark);margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--accent);display:inline-block}
    .gcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px;margin-bottom:8px}
    .fg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
    .fg label{font-size:10px;font-weight:600;color:var(--txt2)}
    .fg input{border:1px solid var(--bdr);border-radius:5px;padding:6px 8px;font-size:12px;outline:none}
    .fg input:focus{border-color:var(--accent)}
    .btn{padding:10px;border-radius:6px;font-weight:600;cursor:pointer;border:none;width:100%;margin-top:10px}
    .btn-p{background:var(--accent);color:#fff}
    .hidden{display:none !important}
    datalist{display:none}
  </style>
</head>
<body>
  <div class="hdr"><div><h1>Qonaq Buraxılışı</h1><p>Forma 1 — SOCAR Tower</p></div></div>

  <div class="wrap">
    <div id="mainView">
      <div class="stitle">Qonaq detalları</div>
      <div id="guestList"></div>

      <div class="stitle" style="margin-top:15px;">Sorğunu verən</div>
      <div class="gcard">
        <div class="fg"><label>Bölmə / Departament</label><input id="fDept" value=""/></div>
        <div style="display:flex;gap:7px;">
          <div class="fg" style="flex:2"><label>Əlaqəli şəxs</label><input id="fContact" value=""/></div>
          <div class="fg" style="flex:1"><label>Daxili nömrə</label><input id="fExt" value=""/></div>
        </div>
        <div class="fg"><label>Dəvətin məqsədi</label><input id="fPurpose" value="Layihə ilə əlaqədar"/></div>
        <div style="display:flex;gap:7px;">
          <div class="fg"><label>Məkan</label><input id="fLocation" value="SOCAR Tower /19-cu mərtəbə"/></div>
          <div class="fg"><label>Müddət</label><input id="fPeriod" value=""/></div>
        </div>
      </div>

      <div class="stitle">Təsdiq edən</div>
      <div class="gcard">
        <div style="display:flex;gap:7px;">
          <div class="fg"><label>Ad, Soyad</label><input id="fApprName" value="Gülnarə İsmayılova"/></div>
          <div class="fg"><label>Vəzifə</label><input id="fApprTitle" value="Şöbə rəisi"/></div>
        </div>
      </div>

      <button class="btn btn-p" onclick="finish()">Sənədi Hazırla</button>
    </div>
  </div>

  <datalist id="companyList">
    <option value="ARDNŞ">
    <option value="SOCAR-ın Baş ofisi">
    <option value="Azneft">
    <option value="Azəriqaz">
    <option value="SOCAR Downstream">
    <option value="SOCAR Upstream">
    <option value="CIC">
    <option value="PwC">
    <option value="Azərikimya">
  </datalist>

<script>
var attendees = [];
var myProfile = { name: "", dept: "", ext: "" };

Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    loadData();
  }
});

function loadData() {
  const item = Office.context.mailbox.item;
  const user = Office.context.mailbox.userProfile;

  // 1. Organizer məlumatlarını Contact Info-dan götür (Sizin profil)
  document.getElementById('fContact').value = user.displayName;
  
  // EWS vasitəsilə əlavə detalları (Dept, Ext) çəkək
  resolveUser(user.emailAddress, (data) => {
    document.getElementById('fDept').value = data.dept; // Sizin "Office Location"
    document.getElementById('fExt').value = data.ext;   // Sizin "Work Phone"
  });

  // 2. Qonaqları siyahıya al
  item.requiredAttendees.getAsync(r => { if(r.value) processAttendees(r.value); });
  
  // 3. Tarix müddəti
  item.start.getAsync(s => {
    item.end.getAsync(e => {
      document.getElementById('fPeriod').value = calcPeriod(s.value, e.value);
    });
  });
}

function processAttendees(list) {
  let html = '';
  list.forEach((a, index) => {
    let initialCompany = guessCompany(a.emailAddress);
    let id = "att_" + index;
    attendees.push({ id: id, name: a.displayName, email: a.emailAddress });

    html += `
      <div class="gcard">
        <div style="font-weight:600; font-size:12px; margin-bottom:5px;">${index + 1}. ${a.displayName}</div>
        <div style="display:flex; gap:7px;">
          <div class="fg" style="flex:2">
            <label>Müəssisə / Şirkət</label>
            <input list="companyList" id="comp_${id}" value="${initialCompany}" placeholder="Yazın və ya seçin...">
          </div>
          <div class="fg" style="flex:1">
            <label>Nəqliyyat</label>
            <input id="car_${id}" placeholder="99-XX-000">
          </div>
        </div>
      </div>`;

    // Hər qonağın öz şirkətini Exchange-dən dəqiqləşdir
    resolveUser(a.emailAddress, (data) => {
      if(data.company) {
        document.getElementById(`comp_${id}`).value = parseCompanyName(data.company);
      }
    });
  });
  document.getElementById('guestList').innerHTML = html;
}

// "1000 - ARDNŞ" -> "ARDNŞ" çevirən funksiya
function parseCompanyName(rawName) {
  if (!rawName) return "";
  // Əgər tire varsa, tire-dən sonrakı hissəni götür və boşluqları təmizlə
  if (rawName.indexOf(" - ") !== -1) {
    return rawName.split(" - ")[1].trim();
  }
  return rawName;
}

function resolveUser(email, cb) {
  var ews = '<?xml version="1.0" encoding="utf-8"?>'+
    '<soap:Envelope xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:m="http://schemas.microsoft.com/exchange/services/2006/messages" xmlns:t="http://schemas.microsoft.com/exchange/services/2006/types" xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">'+
    '<soap:Header><t:RequestServerVersion Version="Exchange2013" /></soap:Header>'+
    '<soap:Body><m:ResolveNames ReturnFullContactData="true"><m:UnresolvedEntry>'+email+'</m:UnresolvedEntry></m:ResolveNames></soap:Body></soap:Envelope>';

  Office.context.mailbox.makeEwsRequestAsync(ews, (asyncResult) => {
    if (asyncResult.status === "succeeded") {
      var parser = new DOMParser();
      var xml = parser.parseFromString(asyncResult.value, "text/xml");
      cb({
        company: xml.getElementsByTagName("t:CompanyName")[0]?.textContent || "",
        dept: xml.getElementsByTagName("t:OfficeLocation")[0]?.textContent || xml.getElementsByTagName("t:Department")[0]?.textContent || "",
        ext: xml.getElementsByTagName("t:BusinessPhone")[0]?.textContent || ""
      });
    }
  });
}

function guessCompany(em) {
  if(!em) return ""; em = em.toLowerCase();
  if(em.includes("socar.az") || em.includes("ardns")) return "ARDNŞ";
  if(em.includes("socardownstream")) return "SOCAR Downstream";
  if(em.includes("pwc")) return "PwC";
  return "";
}

function calcPeriod(s, e) {
  if(!s || !e) return "";
  const months = ["yanvar","fevral","mart","aprel","may","iyun","iyul","avqust","sentyabr","oktyabr","noyabr","dekabr"];
  if(s.toDateString() === e.toDateString()) return s.getDate() + " " + months[s.getMonth()];
  return s.getDate() + " " + months[s.getMonth()] + " - " + e.getDate() + " " + months[e.getMonth()];
}

function finish() {
  // Burada əvvəlki sənəd yaratma (Blob/Zip) məntiqi işə düşür
  alert("Sənəd hazırlanır...");
}
</script>
</body>
</html>
