<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root{--dark:#1a1a2e;--accent:#0078d4;--bg:#f4f5f7;--card:#fff;--bdr:#e1e4e8;--txt:#24292e;--txt2:#586069}
    body{font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--txt);background:var(--bg);margin:0;padding:0}
    .hdr{background:var(--dark);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
    .wrap{padding:14px 16px}
    .stitle{font-size:11.5px;font-weight:700;color:var(--dark);margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--accent);display:inline-block;width:100%}
    .gcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px;margin-bottom:8px}
    .fg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
    .fg label{font-size:10px;font-weight:600;color:var(--txt2)}
    .fg input{border:1px solid var(--bdr);border-radius:5px;padding:6px 8px;font-size:12px;outline:none;width:100%;box-sizing:border-box}
    .btn{padding:10px;border-radius:6px;font-weight:600;cursor:pointer;border:none;width:100%;margin-top:5px}
    .btn-p{background:var(--accent);color:#fff}
    .btn-debug{background:#ff9800;color:#fff;font-size:10px;padding:4px 8px;margin-top:10px}
    .info-msg{color:#d93025;font-weight:600;font-size:11px;padding:10px;text-align:center;background:#fce8e6;border-radius:5px}
  </style>
</head>
<body>
  <div class="hdr">
    <div><h1 style="margin:0;font-size:16px;">Qonaq Buraxılışı</h1></div>
    <button class="btn btn-p" style="width:auto; font-size:11px;" onclick="loadData()">Məlumatları Çək ↻</button>
  </div>

  <div class="wrap">
    <div id="statusBox" class="info-msg" style="display:none;"></div>
    
    <div class="stitle">Qonaq detalları</div>
    <div id="guestList"><div class="info-msg" style="background:none; color:var(--txt2)">Düyməyə basaraq qonaqları yükləyin...</div></div>

    <div class="stitle" style="margin-top:10px;">Sorğunu verən</div>
    <div class="gcard">
      <div class="fg"><label>Bölmə / Departament</label><input id="fDept"></div>
      <div style="display:flex;gap:7px;">
        <div class="fg" style="flex:2"><label>Əlaqəli şəxs</label><input id="fContact"></div>
        <div class="fg" style="flex:1"><label>Daxili nömrə</label><input id="fExt"></div>
      </div>
    </div>

    <button class="btn btn-p" onclick="finish()">Sənədi Hazırla</button>
  </div>

<script>
Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    console.log("Office Ready");
    loadData();
  }
});

function showStatus(msg, isError = true) {
    const box = document.getElementById('statusBox');
    box.innerText = msg;
    box.style.display = 'block';
    box.style.backgroundColor = isError ? '#fce8e6' : '#e6f4ea';
    box.style.color = isError ? '#d93025' : '#1e8e3e';
}

function loadData() {
  const item = Office.context.mailbox.item;
  const user = Office.context.mailbox.userProfile;

  if (!item) {
    showStatus("Outlook predmeti tapılmadı!");
    return;
  }

  // 1. Profil məlumatları
  document.getElementById('fContact').value = user.displayName || "";
  
  // 2. Qonaqları çək (Daha geniş yoxlama)
  document.getElementById('guestList').innerHTML = "Yüklənir...";

  item.requiredAttendees.getAsync((res) => {
    let allGuests = [];
    if (res.status === Office.AsyncResultStatus.Succeeded) {
      allGuests = allGuests.concat(res.value);
    }

    item.optionalAttendees.getAsync((resOpt) => {
      if (resOpt.status === Office.AsyncResultStatus.Succeeded) {
        allGuests = allGuests.concat(resOpt.value);
      }

      if (allGuests.length > 0) {
        renderGuests(allGuests);
        showStatus("Qonaqlar uğurla gətirildi", false);
      } else {
        document.getElementById('guestList').innerHTML = '<div class="info-msg">Qonaq tapılmadı. Görüşə adam əlavə edib "Save" edin.</div>';
      }
    });
  });

  // 3. Sizin Dept və Ext (EWS ilə)
  resolveUser(user.emailAddress, (data) => {
    if(data.dept) document.getElementById('fDept').value = data.dept;
    if(data.ext) document.getElementById('fExt').value = data.ext;
  });
}

function renderGuests(list) {
  let html = '';
  list.forEach((a, i) => {
    if (!a.displayName && !a.emailAddress) return;
    html += `
      <div class="gcard">
        <div style="font-weight:600;">${i+1}. ${a.displayName || a.emailAddress}</div>
        <div style="display:flex; gap:5px; margin-top:5px;">
           <input list="companyList" id="comp_${i}" value="${guessCompany(a.emailAddress)}" style="flex:2; padding:4px; font-size:11px;" placeholder="Şirkət">
           <input id="car_${i}" style="flex:1; padding:4px; font-size:11px;" placeholder="Maşın">
        </div>
      </div>`;
  });
  document.getElementById('guestList').innerHTML = html;
}

function resolveUser(email, cb) {
  if (!email) return;
  const ews = '<?xml version="1.0" encoding="utf-8"?><soap:Envelope xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:m="http://schemas.microsoft.com/exchange/services/2006/messages" xmlns:t="http://schemas.microsoft.com/exchange/services/2006/types" xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/"><soap:Header><t:RequestServerVersion Version="Exchange2013" /></soap:Header><soap:Body><m:ResolveNames ReturnFullContactData="true"><m:UnresolvedEntry>'+email+'</m:UnresolvedEntry></m:ResolveNames></soap:Body></soap:Envelope>';
  Office.context.mailbox.makeEwsRequestAsync(ews, (res) => {
    if (res.status === "succeeded") {
      const parser = new DOMParser();
      const xml = parser.parseFromString(res.value, "text/xml");
      cb({
        dept: xml.getElementsByTagName("t:OfficeLocation")[0]?.textContent || xml.getElementsByTagName("t:Department")[0]?.textContent || "",
        ext: xml.getElementsByTagName("t:BusinessPhone")[0]?.textContent || ""
      });
    }
  });
}

function guessCompany(em) {
  if(!em) return ""; em = em.toLowerCase();
  if(em.includes("socar.az")) return "ARDNŞ";
  if(em.includes("socardownstream")) return "SOCAR Downstream";
  if(em.includes("pwc")) return "PwC";
  return "";
}

function finish() { alert("Word faylı hazırlanır..."); }
</script>

<datalist id="companyList">
  <option value="ARDNŞ"><option value="SOCAR-ın Baş ofisi"><option value="SOCAR Downstream"><option value="PwC">
</datalist>

</body>
</html>
