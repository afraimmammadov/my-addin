    .att-row{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:3px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;transition:all .15s}

    .att-name{font-size:12.5px;font-weight:600}.att-email{font-size:10px;color:var(--txt2)}
    .att-badge{display:inline-block;background:rgba(0,120,212,.1);color:var(--accent);font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto}
    .gcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:11px 11px 7px;margin-bottom:7px;position:relative}
    .gcard-num{position:absolute;top:-7px;left:10px;background:var(--accent);color:#fff;font-size:9.5px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center}

</head>

      </div>
      <div class="btn-row"><button class="btn btn-g" onclick="goStep1()">&#8592; Geri</button><button class="btn btn-p btn-full" onclick="goStep3()">Önizləmə &#8594;</button></div>
    </div>
    <div id="step3" class="hidden"><div class="stitle">Önizləmə</div><div class="preview-box" id="previewForma"></div>
      <div class="email-box"><div style="font-size:10px;color:var(--txt2);font-weight:600;margin-bottom:4px;">EMAIL GÖNDƏRİLƏCƏK:</div><div id="emailMeta"></div><div class="email-body" id="emailBody"></div></div>
      <div class="fg" style="margin-bottom:4px;"><label>Reception email</label><input id="fRecipient" value="socar.reception@socar.az"/></div>
      <div class="btn-row"><button class="btn btn-g" onclick="goStep2From3()">&#8592; Düzəliş</button><button class="btn btn-p btn-full" id="btnSend" onclick="sendAll()">&#x1F4E7; Göndər + Forma 1</button></div>
      <div id="statusBar" class="status hidden"></div>
    </div>

function escXml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');}

/* ═══ APP ═══ */
var attendees=[],selectedIds=new Set();
var meetingData={subject:'',dateTime:'',organizer:'',ext:'',startDate:null,endDate:null,officeLocation:''};
var SUBSIDIARIES=["SOCAR-\u0131n Ba\u015f ofisi","Azneft","Az\u0259riqaz","Az\u0259rikimya","SDM","CIC","NeftQazTikinti","SOCAR Upstream","SOCAR Midstream","SOCAR Downstream","Qaz \u0130xrac \u0130dar\u0259si","Kompleks Qazma","Neft K\u0259m\u0259rl\u0259ri","SOCAR Polymer","SOCAR Methanol","SOCAR Energy","PwC","Dig\u0259r"];

Office.onReady(function(info){
  if(info.host===Office.HostType.Outlook){loadFromOutlook();}
  else{meetingData={subject:'Test',dateTime:fmtD(new Date()),organizer:'Afraim Mammadov',ext:'15292',startDate:new Date(),endDate:new Date(Date.now()+3*86400000),officeLocation:'T\u0259\u015fkilati ink. proq. mo. \u015f\u00f6b\u0259si'};updateMeetingBar();document.getElementById('fDept').value=meetingData.officeLocation;document.getElementById('fContact').value=meetingData.organizer;document.getElementById('fExt').value=meetingData.ext;document.getElementById('fPeriod').value=calcPeriod(meetingData.startDate,meetingData.endDate);}
});

function loadFromOutlook(){
  var item=Office.context.mailbox.item;
  item.subject.getAsync(function(r){if(r.status===Office.AsyncResultStatus.Succeeded){meetingData.subject=r.value||'G\u00f6r\u00fc\u015f';updateMeetingBar();}});
  item.start.getAsync(function(r){if(r.status===Office.AsyncResultStatus.Succeeded){meetingData.startDate=r.value;meetingData.dateTime=fmtD(r.value);updateMeetingBar();
    item.end.getAsync(function(r2){if(r2.status===Office.AsyncResultStatus.Succeeded){meetingData.endDate=r2.value;document.getElementById('fPeriod').value=calcPeriod(meetingData.startDate,meetingData.endDate);}});}});
  try{var p=Office.context.mailbox.userProfile;meetingData.organizer=p.displayName||'';document.getElementById('fContact').value=meetingData.organizer;
    resolveUser(p.emailAddress,function(i){if(i.officeLocation){meetingData.officeLocation=i.officeLocation;document.getElementById('fDept').value=i.officeLocation;}if(i.phoneNumber){meetingData.ext=i.phoneNumber;document.getElementById('fExt').value=i.phoneNumber;}});
  }catch(e){}
  item.requiredAttendees.getAsync(function(r){if(r.status===Office.AsyncResultStatus.Succeeded){
    var req=(r.value||[]).map(function(a,i){return{id:i,name:a.displayName||a.emailAddress,email:a.emailAddress,company:guessCompany(a.emailAddress),vehicle:'',type:'required'};});
    item.optionalAttendees.getAsync(function(r2){var opt=[];if(r2.status===Office.AsyncResultStatus.Succeeded)opt=(r2.value||[]).map(function(a,i){return{id:req.length+i,name:a.displayName||a.emailAddress,email:a.emailAddress,company:guessCompany(a.emailAddress),vehicle:'',type:'optional'};});
      attendees=req.concat(opt);
      attendees.forEach(function(att){if(!att.company&&att.email)resolveUser(att.email,function(i){if(i.company)att.company=i.company;});});
      document.getElementById('step0desc').innerHTML=attendees.length+' attendee \u00fc\u00e7\u00fcn Forma 1 haz\u0131rlanacaq<br>v\u0259 reception-a g\u00f6nd\u0259ril\u0259c\u0259k';
    });
  }});
}

function resolveUser(email,cb){
  try{var soap='<?xml version="1.0" encoding="utf-8"?><soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/" xmlns:t="http://schemas.microsoft.com/exchange/services/2006/types"><soap:Body><ResolveNames xmlns="http://schemas.microsoft.com/exchange/services/2006/messages" ReturnFullContactData="true"><UnresolvedEntry>'+escXml(email)+'</UnresolvedEntry></ResolveNames></soap:Body></soap:Envelope>';
    Office.context.mailbox.makeEwsRequestAsync(soap,function(r){if(r.status===Office.AsyncResultStatus.Succeeded){var v=r.value;var co='',ol='',ph='';var m1=v.match(/<t:CompanyName>([^<]*)<\/t:CompanyName>/);if(m1)co=m1[1];var m2=v.match(/<t:OfficeLocation>([^<]*)<\/t:OfficeLocation>/);if(m2)ol=m2[1];var m3=v.match(/<t:PhoneNumber>([^<]*)<\/t:PhoneNumber>/);if(m3)ph=m3[1];cb({company:co,officeLocation:ol,phoneNumber:ph});}else cb({});});
  }catch(e){cb({});}
}

function calcPeriod(s,e){if(!s)return'';var d1=new Date(s),d2=e?new Date(e):d1;var dy1=d1.getDate(),mn1=d1.getMonth(),dy2=d2.getDate(),mn2=d2.getMonth();var ms=['yanvar','fevral','mart','aprel','may','iyun','iyul','avqust','sentyabr','oktyabr','noyabr','dekabr'];if(dy1===dy2&&mn1===mn2)return dy1+' '+ms[mn1];if(mn1===mn2)return dy1+'-'+dy2+' '+ms[mn1];return dy1+' '+ms[mn1]+' - '+dy2+' '+ms[mn2];}

function guessCompany(em){if(!em)return'';em=em.toLowerCase();if(em.indexOf('pwc')>=0)return'PwC';if(em.indexOf('cic.socar')>=0||em.indexOf('@cic.')>=0||em.indexOf('caspi')>=0)return'CIC';if(em.indexOf('azeriqaz')>=0)return'Az\u0259riqaz';if(em.indexOf('gei.socar')>=0)return'Qaz \u0130xrac \u0130dar\u0259si';if(em.indexOf('azneft')>=0)return'Azneft';if(em.indexOf('sdm')>=0)return'SDM';if(em.indexOf('upstream')>=0)return'SOCAR Upstream';if(em.indexOf('midstream')>=0)return'SOCAR Midstream';if(em.indexOf('downstream')>=0)return'SOCAR Downstream';if(em.indexOf('azerikimya')>=0)return'Az\u0259rikimya';if(em.indexOf('neftqaz')>=0)return'NeftQazTikinti';if(em.indexOf('socar.az')>=0)return'SOCAR-\u0131n Ba\u015f ofisi';return'';}

function fmtD(d){return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function updateMeetingBar(){document.getElementById('mSubject').textContent=meetingData.subject;document.getElementById('mDate').textContent=meetingData.dateTime;}
function showStep(n){['step0','step1','step2','step3','step4'].forEach(function(id){document.getElementById(id).classList.add('hidden');});document.getElementById('step'+n).classList.remove('hidden');}
function startProcess(){if(attendees.length===0)attendees=[{id:0,name:'',email:'',company:'',vehicle:'',type:'manual'}];selectedIds=new Set(attendees.map(function(a){return a.id;}));renderAttendeeList();showStep(1);}
function goStep1(){showStep(1)}function goStep2(){if(selectedIds.size===0)return;renderGuestDetails();showStep(2)}function goStep2From3(){showStep(2)}function goStep3(){renderPreview();showStep(3)}

function renderAttendeeList(){var list=document.getElementById('attList'),html='';
  attendees.forEach(function(a){var sel=selectedIds.has(a.id);
    if(a.type==='manual'){html+='<div class="gcard" style="margin-bottom:6px;"><div style="display:flex;gap:7px;"><div class="fg"><label>Ad Soyad</label><input value="'+esc(a.name)+'" placeholder="Qona\u011f\u0131n ad\u0131 soyad\u0131" onchange="attendees['+a.id+'].name=this.value"/></div><div class="fg"><label>Email</label><input value="'+esc(a.email)+'" placeholder="email@company.com" onchange="attendees['+a.id+'].email=this.value;attendees['+a.id+'].company=guessCompany(this.value)"/></div></div>'+(a.id>0?'<button class="btn btn-g" style="font-size:10px;padding:3px 8px;margin-top:4px;" onclick="removeManual('+a.id+')">Sil</button>':'')+'</div>';}
    else{html+='<div class="att-row '+(sel?'sel':'')+'" onclick="toggleAtt('+a.id+')"><input type="checkbox" '+(sel?'checked':'')+' onclick="event.stopPropagation();toggleAtt('+a.id+')"/><div style="flex:1"><div class="att-name">'+esc(a.name)+'</div><div class="att-email">'+esc(a.email)+'</div></div>'+(a.company?'<span class="att-badge">'+esc(a.company)+'</span>':'')+'</div>';}});
  html+='<button class="btn btn-g" style="width:100%;margin-top:8px;font-size:12px;" onclick="addManualGuest()">+ \u018fl il\u0259 qonaq \u0259lav\u0259 et</button>';list.innerHTML=html;
  document.getElementById('attTitle').textContent='Attendee-l\u0259ri se\u00e7 ('+selectedIds.size+')';document.getElementById('btnToStep2').textContent='Davam et ('+selectedIds.size+' n\u0259f\u0259r)';}
function toggleAtt(id){if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);renderAttendeeList();}
function addManualGuest(){var n=attendees.length;attendees.push({id:n,name:'',email:'',company:'',vehicle:'',type:'manual'});selectedIds.add(n);renderAttendeeList();}
function removeManual(id){attendees=attendees.filter(function(a){return a.id!==id;});selectedIds.delete(id);renderAttendeeList();}
function renderGuestDetails(){var c=document.getElementById('guestDetails'),active=getActiveGuests(),html='';
  active.forEach(function(g,i){var opts=SUBSIDIARIES.map(function(s){return'<option value="'+esc(s)+'" '+(g.company===s?'selected':'')+'>'+esc(s)+'</option>';}).join('');
    html+='<div class="gcard"><div class="gcard-num">'+(i+1)+'</div><div class="gcard-name">'+(esc(g.name)||'(ad daxil edin)')+'</div><div style="display:flex;gap:7px;"><div class="fg" style="flex:2"><label>M\u00fc\u0259ssis\u0259 / \u015eirk\u0259t</label><select onchange="updateGuestField('+g.id+',\'company\',this.value)"><option value="">Se\u00e7in...</option>'+opts+'</select></div><div class="fg" style="flex:1"><label>N\u0259qliyyat (varsa)</label><input value="'+esc(g.vehicle)+'" placeholder="99-XX-000" onchange="updateGuestField('+g.id+',\'vehicle\',this.value)"/></div></div></div>';});c.innerHTML=html;}
function updateGuestField(id,f,v){var a=attendees.find(function(x){return x.id===id;});if(a)a[f]=v;}
function getActiveGuests(){return attendees.filter(function(a){return selectedIds.has(a.id)||a.type==='manual';});}
function renderPreview(){var guests=getActiveGuests(),meta=getFormMeta();
  var fH='<div style="text-align:center;margin-bottom:8px;"><div style="font-weight:700;font-size:12px;">\u201CSOCAR Tower\u201D-\u0259 burax\u0131l\u0131\u015f \u00fc\u00e7\u00fcn</div><div style="font-weight:700;letter-spacing:3px;">S \u0130 F A R \u0130 \u015e</div></div><table><tbody><tr class="info-row"><td>B\u00f6lm\u0259</td><td>'+esc(meta.department)+'</td></tr><tr class="info-row"><td>M\u0259qs\u0259d</td><td>'+esc(meta.purpose)+'</td></tr><tr class="info-row"><td>Yer</td><td>'+esc(meta.location)+'</td></tr><tr class="info-row"><td>M\u00fcdd\u0259t</td><td>'+esc(meta.period)+'</td></tr></tbody></table><table style="margin-top:8px;"><thead><tr><th>\u2116</th><th>Ad Soyad</th><th>M\u00fc\u0259ssis\u0259</th><th>N\u0259qliyyat</th></tr></thead><tbody>';
  guests.forEach(function(g,i){fH+='<tr><td>'+(i+1)+'</td><td>'+esc(g.name)+'</td><td>'+esc(g.company)+'</td><td>'+(esc(g.vehicle)||'\u2014')+'</td></tr>';});
  fH+='</tbody></table>';document.getElementById('previewForma').innerHTML=fH;
  document.getElementById('emailMeta').innerHTML='<b>To:</b> '+esc(document.getElementById('fRecipient').value)+'<br><b>Subject:</b> Burax\u0131l\u0131\u015f sifari\u015fi \u2014 '+esc(meetingData.subject)+' ('+esc(meta.period)+')<br><b>Attach:</b> \uD83D\uDCCE forma1_buraxilis.docx';
  document.getElementById('emailBody').textContent=buildEmailText(meta);}
function getFormMeta(){return{purpose:document.getElementById('fPurpose').value,location:document.getElementById('fLocation').value,period:document.getElementById('fPeriod').value,department:document.getElementById('fDept').value,contact:document.getElementById('fContact').value,ext:document.getElementById('fExt').value,approverName:document.getElementById('fApprName').value,approverTitle:document.getElementById('fApprTitle').value};}
function buildEmailText(m){return'H\u00f6rm\u0259tli h\u0259mkarlar,\n\nQo\u015fmadak\u0131 h\u0259mkarlar\u0131n Ba\u015f Ofis\u0259 burax\u0131l\u0131\u015f\u0131 il\u0259 ba\u011fl\u0131 d\u0259st\u0259yinizi xahi\u015f edirik.\n\nH\u00f6rm\u0259tl\u0259,\n'+m.contact;}
function buildEmailHtml(m){return'<div style="font-family:Segoe UI,sans-serif;font-size:13px;color:#323130;"><p>H\u00f6rm\u0259tli h\u0259mkarlar,</p><p>Qo\u015fmadak\u0131 h\u0259mkarlar\u0131n Ba\u015f Ofis\u0259 burax\u0131l\u0131\u015f\u0131 il\u0259 ba\u011fl\u0131 d\u0259st\u0259yinizi xahi\u015f edirik.</p><p>H\u00f6rm\u0259tl\u0259,<br/><strong>'+esc(m.contact)+'</strong></p></div>';}
function sendAll(){var btn=document.getElementById('btnSend');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Haz\u0131rlan\u0131r...';
  try{var guests=getActiveGuests(),meta=getFormMeta(),recipient=document.getElementById('fRecipient').value;
    var blob=generateDocxBlob(guests,meta);var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='forma1_buraxilis.docx';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    try{Office.context.mailbox.displayNewMessageForm({toRecipients:[recipient],subject:'Burax\u0131l\u0131\u015f sifari\u015fi \u2014 '+meetingData.subject+' ('+meta.period+')',htmlBody:buildEmailHtml(meta)});}catch(e){window.open('mailto:'+recipient+'?subject='+encodeURIComponent('Burax\u0131l\u0131\u015f sifari\u015fi \u2014 '+meetingData.subject)+'\u0026body='+encodeURIComponent(buildEmailText(meta)));}
    showDone(guests.length,recipient);
  }catch(err){btn.disabled=false;btn.innerHTML='\uD83D\uDCE7 G\u00f6nd\u0259r + Forma 1';showStatus('err','X\u0259ta: '+err.message);}}
function showDone(c,r){document.getElementById('doneMsg').innerHTML='Forma 1 ('+c+' n\u0259f\u0259r) Word format\u0131nda y\u00fckl\u0259ndi<br><b>'+esc(r)+'</b> \u00fcnvan\u0131na email a\u00e7\u0131ld\u0131.';showStep(4);}
function showStatus(t,m){var b=document.getElementById('statusBar');b.className='status '+(t==='err'?'err':'ok');b.textContent=m;b.classList.remove('hidden');}
function resetAll(){selectedIds=new Set(attendees.map(function(a){return a.id;}));showStep(0);}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
