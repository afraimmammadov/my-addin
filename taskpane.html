<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qonaq Buraxılışı — Forma 1</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    :root {
      --dark: #1a1a2e;
      --accent: #0078d4;
      --accent-h: #106ebe;
      --ok: #107c10;
      --bg: #f4f5f7;
      --card: #ffffff;
      --bdr: #e1e4e8;
      --txt: #24292e;
      --txt2: #586069;
      --err: #d13438;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; color:var(--txt); background:var(--bg); }

    .hdr { background:var(--dark); color:#fff; padding:13px 16px; display:flex; align-items:center; gap:10px; }
    .hdr-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .hdr h1 { font-size:13.5px; font-weight:700; }
    .hdr p { font-size:10.5px; opacity:.6; margin-top:1px; }

    .mbar { background:var(--card); border-bottom:1px solid var(--bdr); padding:9px 16px; display:flex; gap:16px; font-size:11.5px; }
    .mbar .lbl { font-size:9.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--txt2); font-weight:700; }
    .mbar b { display:block; margin-top:1px; }

    .wrap { padding:14px 16px; }
    .stitle { font-size:11.5px; font-weight:700; color:var(--dark); margin-bottom:10px; padding-bottom:5px; border-bottom:2px solid var(--accent); display:inline-block; }

    .att-row { display:flex; align-items:center; gap:8px; padding:7px 10px; margin-bottom:3px; background:var(--card); border:1px solid var(--bdr); border-radius:6px; cursor:pointer; transition:all .15s; }
    .att-row.sel { background:rgba(0,120,212,.05); border-color:rgba(0,120,212,.3); }
    .att-row input[type=checkbox] { accent-color:var(--accent); width:15px; height:15px; }
    .att-name { font-size:12.5px; font-weight:600; }
    .att-email { font-size:10px; color:var(--txt2); }
    .att-badge { display:inline-block; background:rgba(0,120,212,.1); color:var(--accent); font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:auto; }

    .gcard { background:var(--card); border:1px solid var(--bdr); border-radius:8px; padding:11px 11px 7px; margin-bottom:7px; position:relative; }
    .gcard-num { position:absolute; top:-7px; left:10px; background:var(--accent); color:#fff; font-size:9.5px; font-weight:700; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .gcard-name { font-size:12px; font-weight:600; margin-bottom:7px; padding-left:18px; }

    .fg { flex:1; display:flex; flex-direction:column; gap:2px; }
    .fg label { font-size:10px; font-weight:600; color:var(--txt2); }
    .fg input, .fg select, .fg textarea {
      border:1px solid var(--bdr); border-radius:5px; padding:6px 8px; font-size:12px;
      font-family:inherit; color:var(--txt); background:#fafbfc; outline:none; width:100%;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus {
      border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,120,212,.1); background:#fff;
    }

    .meta-card { margin-top:10px; background:var(--card); border:1px solid var(--bdr); border-radius:8px; padding:11px; }

    .btn { padding:9px 16px; border-radius:6px; font-size:12.5px; font-weight:600; cursor:pointer; border:none; transition:all .15s; }
    .btn-p { background:var(--accent); color:#fff; }
    .btn-p:hover { background:var(--accent-h); }
    .btn-p:disabled { background:#c8c6c4; cursor:not-allowed; }
    .btn-g { background:transparent; border:1px solid var(--bdr); color:var(--txt); }
    .btn-g:hover { background:#f0f2f5; }
    .btn-full { flex:1; }
    .btn-row { display:flex; gap:8px; margin-top:12px; }

    .preview-box { background:#fff; border:1px solid var(--bdr); border-radius:6px; padding:12px; margin-bottom:9px; font-size:11px; line-height:1.6; }
    .preview-box table { width:100%; border-collapse:collapse; font-size:10px; }
    .preview-box th { padding:4px 6px; border-bottom:1px solid var(--bdr); text-align:left; font-weight:600; background:#f0f2f5; }
    .preview-box td { padding:3px 6px; border-bottom:1px solid #f0f2f5; }
    .preview-box .info-row td { padding:3px 8px; border-bottom:1px solid var(--bdr); }
    .preview-box .info-row td:first-child { font-weight:600; color:var(--txt2); width:80px; }

    .email-box { background:#fafbfc; border:1px solid var(--bdr); border-radius:6px; padding:11px; margin-bottom:9px; font-size:11px; }
    .email-body { white-space:pre-wrap; background:#fff; padding:8px; border-radius:4px; border:1px solid var(--bdr); margin-top:6px; line-height:1.6; }

    .center { text-align:center; padding:28px 10px; }
    .center .icon { font-size:34px; margin-bottom:10px; }
    .center h2 { font-size:14px; font-weight:600; margin-bottom:5px; }
    .center p { font-size:12px; color:var(--txt2); line-height:1.5; margin-bottom:16px; }

    .status { padding:9px 14px; border-radius:6px; font-size:12px; font-weight:500; text-align:center; margin-top:8px; }
    .status.ok { background:#dff6dd; color:var(--ok); border:1px solid #a7e3a5; }
    .status.err { background:#fde7e9; color:var(--err); border:1px solid #f1bbbc; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .5s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .hidden { display:none !important; }
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-icon">&#x1F3E2;</div>
    <div>
      <h1>Qonaq Buraxilisi</h1>
      <p>Forma 1 — SOCAR Tower</p>
    </div>
  </div>

  <div class="mbar">
    <div><span class="lbl">Gorus</span><b id="mSubject">—</b></div>
    <div><span class="lbl">Tarix</span><b id="mDate">—</b></div>
  </div>

  <div class="wrap">

    <!-- STEP 0: Prompt -->
    <div id="step0" class="center">
      <div class="icon">&#x1F4CB;</div>
      <h2>Buraxilis formasi lazimdir?</h2>
      <p id="step0desc">Attendee-ler ucun Forma 1 hazirlanacaq ve reception-a gonderilecek</p>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn btn-p" onclick="startProcess()">Beli, hazirla</button>
        <button class="btn btn-g" onclick="window.close()">Xeyr</button>
      </div>
    </div>

    <!-- STEP 1: Select attendees -->
    <div id="step1" class="hidden">
      <div class="stitle" id="attTitle">Attendee-leri sec</div>
      <div id="attList"></div>
      <div class="btn-row">
        <button class="btn btn-p btn-full" id="btnToStep2" onclick="goStep2()">Davam et</button>
      </div>
    </div>

    <!-- STEP 2: Fill details -->
    <div id="step2" class="hidden">
      <div class="stitle">Qonaq detallari</div>
      <div id="guestDetails"></div>

      <div class="meta-card">
        <div class="stitle">Forma melumatlari</div>
        <div style="display:flex;gap:7px;margin-bottom:5px;">
          <div class="fg"><label>Devetin meqsedi</label><input id="fPurpose" value="Layihe ile elaqedar" /></div>
        </div>
        <div style="display:flex;gap:7px;margin-bottom:5px;">
          <div class="fg"><label>Devet olundugu yer</label><input id="fLocation" value="SOCAR Tower /25-ci mertebe" /></div>
          <div class="fg"><label>Muddet</label><input id="fPeriod" value="" /></div>
        </div>
        <div style="display:flex;gap:7px;margin-bottom:5px;">
          <div class="fg"><label>Bolme / Departament</label><input id="fDept" value="" /></div>
          <div class="fg"><label>Elaqeli sexs</label><input id="fContact" value="" /></div>
        </div>
        <div style="display:flex;gap:7px;margin-bottom:5px;">
          <div class="fg"><label>Daxili nomre</label><input id="fExt" value="" /></div>
        </div>
        <div style="display:flex;gap:7px;">
          <div class="fg"><label>Tesdiq eden (ad)</label><input id="fApprName" value="" /></div>
          <div class="fg"><label>Vezife</label><input id="fApprTitle" value="" /></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-g" onclick="goStep1()">Geri</button>
        <button class="btn btn-p btn-full" onclick="goStep3()">Onizleme</button>
      </div>
    </div>

    <!-- STEP 3: Preview & Send -->
    <div id="step3" class="hidden">
      <div class="stitle">Onizleme</div>
      <div class="preview-box" id="previewForma"></div>
      <div class="email-box">
        <div style="font-size:10px;color:var(--txt2);font-weight:600;margin-bottom:4px;">EMAIL GONDERILECEK:</div>
        <div id="emailMeta"></div>
        <div class="email-body" id="emailBody"></div>
      </div>
      <div class="fg" style="margin-bottom:4px;">
        <label>Reception email</label>
        <input id="fRecipient" value="socar.reception@socar.az" />
      </div>
      <div class="btn-row">
        <button class="btn btn-g" onclick="goStep2From3()">Duzelis</button>
        <button class="btn btn-p btn-full" id="btnSend" onclick="sendAll()">Gonder + Forma 1</button>
      </div>
      <div id="statusBar" class="status hidden"></div>
    </div>

    <!-- STEP 4: Done -->
    <div id="step4" class="hidden center">
      <div class="icon">&#x2705;</div>
      <h2 style="color:var(--ok);">Gonderildi!</h2>
      <p id="doneMsg"></p>
      <button class="btn btn-g" onclick="resetAll()">Yeni sifaris</button>
    </div>
  </div>

<script>
var attendees = [];
var selectedIds = new Set();
var meetingData = { subject: '', dateTime: '', organizer: '', department: '', ext: '' };

var SUBSIDIARIES = [
  "SOCAR-in Bas ofisi","Azneft","Azeriqaz","Azerikimya","SDM","CIC",
  "NeftQazTikinti","SOCAR Upstream","SOCAR Midstream","Qaz Ixrac Idaresi",
  "Kompleks Qazma","Neft Kemerleri","SOCAR Polymer","SOCAR Methanol",
  "SOCAR Energy","PwC","Diger"
];

Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    loadFromOutlook();
  } else {
    meetingData = {
      subject: 'Test Meeting',
      dateTime: formatDate(new Date()),
      organizer: 'Test User',
      department: 'Test Dept',
      ext: '00000'
    };
    updateMeetingBar();
    document.getElementById('fDept').value = meetingData.department;
    document.getElementById('fContact').value = meetingData.organizer;
    document.getElementById('fExt').value = meetingData.ext;
  }
});

function loadFromOutlook() {
  var item = Office.context.mailbox.item;

  item.subject.getAsync(function(r) {
    if (r.status === Office.AsyncResultStatus.Succeeded) {
      meetingData.subject = r.value || 'Meeting';
      updateMeetingBar();
    }
  });

  item.start.getAsync(function(r) {
    if (r.status === Office.AsyncResultStatus.Succeeded) {
      meetingData.dateTime = formatDate(r.value);
      updateMeetingBar();
    }
  });

  try {
    var profile = Office.context.mailbox.userProfile;
    meetingData.organizer = profile.displayName || '';
    document.getElementById('fContact').value = meetingData.organizer;
  } catch(e) {}

  item.requiredAttendees.getAsync(function(r) {
    if (r.status === Office.AsyncResultStatus.Succeeded) {
      var required = (r.value || []).map(function(a, i) {
        return {
          id: i,
          name: a.displayName || a.emailAddress,
          email: a.emailAddress,
          company: guessCompany(a.emailAddress),
          vehicle: '',
          type: 'required'
        };
      });

      item.optionalAttendees.getAsync(function(r2) {
        var optional = [];
        if (r2.status === Office.AsyncResultStatus.Succeeded) {
          optional = (r2.value || []).map(function(a, i) {
            return {
              id: required.length + i,
              name: a.displayName || a.emailAddress,
              email: a.emailAddress,
              company: guessCompany(a.emailAddress),
              vehicle: '',
              type: 'optional'
            };
          });
        }
        attendees = required.concat(optional);
        document.getElementById('step0desc').innerHTML =
          attendees.length + ' attendee ucun Forma 1 hazirlanacaq<br>ve reception-a gonderilecek';
      });
    }
  });
}

function guessCompany(email) {
  if (!email) return '';
  email = email.toLowerCase();
  if (email.indexOf('pwc') >= 0) return 'PwC';
  if (email.indexOf('cic.socar') >= 0 || email.indexOf('@cic.') >= 0) return 'CIC';
  if (email.indexOf('azeriqaz') >= 0) return 'Azeriqaz';
  if (email.indexOf('gei.socar') >= 0) return 'Qaz Ixrac Idaresi';
  if (email.indexOf('azneft') >= 0) return 'Azneft';
  if (email.indexOf('sdm') >= 0) return 'SDM';
  if (email.indexOf('upstream') >= 0) return 'SOCAR Upstream';
  if (email.indexOf('midstream') >= 0) return 'SOCAR Midstream';
  if (email.indexOf('azerikimya') >= 0) return 'Azerikimya';
  if (email.indexOf('neftqaz') >= 0) return 'NeftQazTikinti';
  if (email.indexOf('polymer') >= 0) return 'SOCAR Polymer';
  if (email.indexOf('downstream') >= 0) return 'SOCAR Downstream';
  if (email.indexOf('socar.az') >= 0) return 'SOCAR-in Bas ofisi';
  return '';
}

function formatDate(d) {
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yy = d.getFullYear();
  var hh = String(d.getHours()).padStart(2,'0');
  var mi = String(d.getMinutes()).padStart(2,'0');
  return dd+'.'+mm+'.'+yy+', '+hh+':'+mi;
}

function updateMeetingBar() {
  document.getElementById('mSubject').textContent = meetingData.subject;
  document.getElementById('mDate').textContent = meetingData.dateTime;
}

function showStep(n) {
  ['step0','step1','step2','step3','step4'].forEach(function(id) {
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById('step'+n).classList.remove('hidden');
}

function startProcess() {
  if (attendees.length === 0) {
    attendees = [{ id: 0, name: '', email: '', company: '', vehicle: '', type: 'manual' }];
  }
  selectedIds = new Set(attendees.map(function(a) { return a.id; }));
  renderAttendeeList();
  showStep(1);
}

function goStep1() { showStep(1); }

function goStep2() {
  if (selectedIds.size === 0) return;
  renderGuestDetails();
  showStep(2);
}

function goStep2From3() { showStep(2); }

function goStep3() {
  renderPreview();
  showStep(3);
}

function renderAttendeeList() {
  var list = document.getElementById('attList');
  var html = '';

  attendees.forEach(function(a) {
    var sel = selectedIds.has(a.id);
    if (a.type === 'manual') {
      html += '<div class="gcard" style="margin-bottom:6px;">' +
        '<div style="display:flex;gap:7px;">' +
        '<div class="fg"><label>Ad Soyad</label><input value="' + esc(a.name) + '" placeholder="Qonagin adi soyadi" onchange="attendees[' + a.id + '].name=this.value" /></div>' +
        '<div class="fg"><label>Email</label><input value="' + esc(a.email) + '" placeholder="email@company.com" onchange="attendees[' + a.id + '].email=this.value;attendees[' + a.id + '].company=guessCompany(this.value)" /></div>' +
        '</div>' +
        (a.id > 0 ? '<button class="btn btn-g" style="font-size:10px;padding:3px 8px;margin-top:4px;" onclick="removeManual(' + a.id + ')">Sil</button>' : '') +
        '</div>';
    } else {
      html += '<div class="att-row ' + (sel ? 'sel' : '') + '" onclick="toggleAtt(' + a.id + ')">' +
        '<input type="checkbox" ' + (sel ? 'checked' : '') + ' onclick="event.stopPropagation();toggleAtt(' + a.id + ')" />' +
        '<div style="flex:1">' +
        '<div class="att-name">' + esc(a.name) + '</div>' +
        '<div class="att-email">' + esc(a.email) + '</div>' +
        '</div>' +
        (a.company ? '<span class="att-badge">' + esc(a.company) + '</span>' : '') +
        '</div>';
    }
  });

  html += '<button class="btn btn-g" style="width:100%;margin-top:8px;font-size:12px;" onclick="addManualGuest()">+ El ile qonaq elave et</button>';
  list.innerHTML = html;

  var cnt = selectedIds.size;
  document.getElementById('attTitle').textContent = 'Attendee-leri sec (' + cnt + ')';
  document.getElementById('btnToStep2').textContent = 'Davam et (' + cnt + ' nefer)';
}

function toggleAtt(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  renderAttendeeList();
}

function addManualGuest() {
  var newId = attendees.length;
  attendees.push({ id: newId, name: '', email: '', company: '', vehicle: '', type: 'manual' });
  selectedIds.add(newId);
  renderAttendeeList();
}

function removeManual(id) {
  attendees = attendees.filter(function(a) { return a.id !== id; });
  selectedIds.delete(id);
  renderAttendeeList();
}

function renderGuestDetails() {
  var container = document.getElementById('guestDetails');
  var active = getActiveGuests();
  var html = '';

  active.forEach(function(g, i) {
    var opts = SUBSIDIARIES.map(function(s) {
      return '<option value="' + esc(s) + '" ' + (g.company === s ? 'selected' : '') + '>' + esc(s) + '</option>';
    }).join('');

    html += '<div class="gcard">' +
      '<div class="gcard-num">' + (i+1) + '</div>' +
      '<div class="gcard-name">' + (esc(g.name) || '(ad daxil edin)') + '</div>' +
      '<div style="display:flex;gap:7px;">' +
      '<div class="fg" style="flex:2"><label>Muessise / Sirket</label>' +
      '<select onchange="updateGuestField(' + g.id + ',\'company\',this.value)">' +
      '<option value="">Secin...</option>' + opts + '</select></div>' +
      '<div class="fg" style="flex:1"><label>Neqliyyat (varsa)</label>' +
      '<input value="' + esc(g.vehicle) + '" placeholder="99-XX-000" onchange="updateGuestField(' + g.id + ',\'vehicle\',this.value)" /></div>' +
      '</div></div>';
  });

  container.innerHTML = html;
}

function updateGuestField(id, field, val) {
  var a = attendees.find(function(x) { return x.id === id; });
  if (a) a[field] = val;
}

function getActiveGuests() {
  return attendees.filter(function(a) { return selectedIds.has(a.id) || a.type === 'manual'; });
}

function renderPreview() {
  var guests = getActiveGuests();
  var meta = getFormMeta();

  var fHtml = '<div style="text-align:center;margin-bottom:8px;">' +
    '<div style="font-weight:700;font-size:12px;">"SOCAR Tower"-e buraxilis ucun</div>' +
    '<div style="font-weight:700;letter-spacing:3px;">S I F A R I S</div></div>' +
    '<table><tbody>' +
    '<tr class="info-row"><td>Bolme</td><td>' + esc(meta.department) + '</td></tr>' +
    '<tr class="info-row"><td>Meqsed</td><td>' + esc(meta.purpose) + '</td></tr>' +
    '<tr class="info-row"><td>Yer</td><td>' + esc(meta.location) + '</td></tr>' +
    '<tr class="info-row"><td>Muddet</td><td>' + esc(meta.period) + '</td></tr>' +
    '</tbody></table>' +
    '<table style="margin-top:8px;"><thead><tr><th>No</th><th>Ad Soyad</th><th>Muessise</th><th>Neqliyyat</th></tr></thead><tbody>';

  guests.forEach(function(g, i) {
    fHtml += '<tr><td>' + (i+1) + '</td><td>' + esc(g.name) + '</td><td>' + esc(g.company) + '</td><td>' + (esc(g.vehicle) || '—') + '</td></tr>';
  });
  fHtml += '</tbody></table>';
  document.getElementById('previewForma').innerHTML = fHtml;

  var recipient = document.getElementById('fRecipient').value;
  document.getElementById('emailMeta').innerHTML =
    '<b>To:</b> ' + esc(recipient) + '<br>' +
    '<b>Subject:</b> Buraxilis sifarisi — ' + esc(meetingData.subject) + ' (' + esc(meta.period) + ')<br>' +
    '<b>Attach:</b> forma1_buraxilis.docx';
  document.getElementById('emailBody').textContent = buildEmailText(guests, meta);
}

function getFormMeta() {
  return {
    purpose: document.getElementById('fPurpose').value,
    location: document.getElementById('fLocation').value,
    period: document.getElementById('fPeriod').value,
    department: document.getElementById('fDept').value,
    contact: document.getElementById('fContact').value,
    ext: document.getElementById('fExt').value,
    approverName: document.getElementById('fApprName').value,
    approverTitle: document.getElementById('fApprTitle').value,
  };
}

function buildEmailText(guests, meta) {
  return 'Hormetli hemkarlar,\n\nQosmadaki hemkarlarin Bas Ofise buraxilisi ile bagli desteyinizi xahis edirik.\n\nHormetle,\n' + meta.contact;
}

function buildEmailHtml(guests, meta) {
  return '<div style="font-family:Segoe UI,sans-serif;font-size:13px;color:#323130;">' +
    '<p>Hormetli hemkarlar,</p>' +
    '<p>Qosmadaki hemkarlarin Bas Ofise buraxilisi ile bagli desteyinizi xahis edirik.</p>' +
    '<p>Hormetle,<br/><strong>' + esc(meta.contact) + '</strong></p></div>';
}

async function generateForma1Docx(guests, meta) {
  var D = docx;
  var thin = { style: D.BorderStyle.SINGLE, size: 1, color: "000000" };
  var brd = { top:thin, bottom:thin, left:thin, right:thin };
  var cm = { top:40, bottom:40, left:80, right:80 };
  var pw = 11906, ml = 1134, mr = 850;
  var cw = pw - ml - mr;
  var ilw = 3200, ivw = cw - ilw;
  var cNo=600, cName=3400, cComp=3400, cVeh=cw-cNo-cName-cComp;

  function infoRow(label, value) {
    return new D.TableRow({ children: [
      new D.TableCell({
        width:{size:ilw,type:D.WidthType.DXA}, borders:brd, margins:cm, verticalAlign:D.VerticalAlign.CENTER,
        children: label.split('\n').map(function(l) { return new D.Paragraph({children:[new D.TextRun({text:l,bold:true,size:22,font:'Times New Roman'})]}); })
      }),
      new D.TableCell({
        width:{size:ivw,type:D.WidthType.DXA}, borders:brd, margins:cm, verticalAlign:D.VerticalAlign.CENTER,
        children: [new D.Paragraph({children:[new D.TextRun({text:value,italics:true,size:22,font:'Times New Roman'})]})]
      })
    ]});
  }

  function hdrCell(text, w) {
    return new D.TableCell({
      width:{size:w,type:D.WidthType.DXA}, borders:brd, margins:cm, verticalAlign:D.VerticalAlign.CENTER,
      children: text.split('\n').map(function(l) { return new D.Paragraph({alignment:D.AlignmentType.CENTER, children:[new D.TextRun({text:l,bold:true,size:20,font:'Times New Roman'})]}); })
    });
  }

  function cell(text, w, bold, align) {
    return new D.TableCell({
      width:{size:w,type:D.WidthType.DXA}, borders:brd, margins:cm, verticalAlign:D.VerticalAlign.CENTER,
      children: [new D.Paragraph({alignment:align||D.AlignmentType.LEFT, children:[new D.TextRun({text:text,bold:!!bold,italics:!bold&&text!=='',size:20,font:'Times New Roman'})]})]
    });
  }

  var today = new Date();
  var months = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avqust','sentyabr','oktyabr','noyabr','dekabr'];
  var dateStr = String(today.getDate()).padStart(2,'0') + ' ' + months[today.getMonth()] + ' ' + today.getFullYear();

  var noBrd = {top:{style:D.BorderStyle.NONE,size:0},bottom:{style:D.BorderStyle.NONE,size:0},left:{style:D.BorderStyle.NONE,size:0},right:{style:D.BorderStyle.NONE,size:0}};
  function plainCell(text,w,bold,italic) {
    return new D.TableCell({
      width:{size:w,type:D.WidthType.DXA}, borders:noBrd, margins:cm,
      children:[new D.Paragraph({children:[new D.TextRun({text:text,bold:!!bold,italics:!!italic,size:20,font:'Times New Roman'})]})]
    });
  }

  var doc = new D.Document({
    styles: { default: { document: { run: { font:'Times New Roman', size:22 } } } },
    sections: [{
      properties: {
        page: { size:{width:pw,height:16838}, margin:{top:850,bottom:850,left:ml,right:mr} }
      },
      children: [
        new D.Paragraph({alignment:D.AlignmentType.LEFT, spacing:{after:100}, children:[new D.TextRun({text:'Forma 1',italics:true,size:20,font:'Times New Roman'})]}),
        new D.Paragraph({alignment:D.AlignmentType.CENTER, spacing:{before:100,after:40}, children:[new D.TextRun({text:'"SOCAR Tower"-e buraxilis ucun',bold:true,size:24,font:'Times New Roman'})]}),
        new D.Paragraph({alignment:D.AlignmentType.CENTER, spacing:{after:100}, children:[new D.TextRun({text:'S I F A R I S',bold:true,size:24,font:'Times New Roman'})]}),
        new D.Paragraph({alignment:D.AlignmentType.RIGHT, spacing:{after:200}, children:[new D.TextRun({text:dateStr,italics:true,size:22,font:'Times New Roman'})]}),

        new D.Table({
          width:{size:cw,type:D.WidthType.DXA}, columnWidths:[ilw,ivw],
          rows: [
            infoRow('Sifarisi veren teskilat, muessise, struktur bolme:', meta.department + ', elaqeli sexs: ' + meta.contact + ' (' + meta.ext + ')'),
            infoRow('Devetin meqsedi:', meta.purpose),
            infoRow('Devet olundugu yer:\n(mertebe)', meta.location),
            infoRow('Devet olunma tarixi ve muddeti:\n(bir is heftesindan artiq olmamaqla)', meta.period),
          ]
        }),

        new D.Paragraph({spacing:{before:200,after:100}, children:[]}),

        new D.Table({
          width:{size:cw,type:D.WidthType.DXA}, columnWidths:[cNo,cName,cComp,cVeh],
          rows: [
            new D.TableRow({children:[
              hdrCell('Sira\nNo',cNo), hdrCell('Soyadi, adi',cName),
              hdrCell('Temsil etdiyi\nMuessise / Sirket / Olke',cComp),
              hdrCell('Neqliyyat vasitesi\nMarkasi / dovlet nomre nisani',cVeh),
            ]}),
            new D.TableRow({children:[
              cell('1',cNo,true,D.AlignmentType.CENTER), cell('2',cName,true,D.AlignmentType.CENTER),
              cell('3',cComp,true,D.AlignmentType.CENTER), cell('4',cVeh,true,D.AlignmentType.CENTER),
            ]}),
          ].concat(guests.map(function(g,i) {
            return new D.TableRow({children:[
              cell(''+(i+1),cNo,false,D.AlignmentType.CENTER), cell(g.name,cName),
              cell(g.company,cComp), cell(g.vehicle||'',cVeh),
            ]});
          })).concat([
            new D.TableRow({children:[
              cell('',cNo,false,D.AlignmentType.CENTER), cell('',cName), cell('',cComp), cell('',cVeh),
            ]})
          ])
        }),

        new D.Paragraph({spacing:{before:300}, children:[]}),

        new D.Table({
          width:{size:cw,type:D.WidthType.DXA}, columnWidths:[2500,1500,3000,500,cw-2500-1500-3000-500],
          rows: [
            new D.TableRow({children:[
              plainCell('Sifaris verdi:',2500,true), plainCell('',1500),
              plainCell(meta.approverTitle,3000,false,true), plainCell('',500),
              plainCell(meta.approverName,cw-2500-1500-3000-500,false,true),
            ]}),
            new D.TableRow({children:[
              plainCell('',2500), plainCell('',1500),
              plainCell('(vezifesi)',3000,false,true), plainCell('',500),
              plainCell('(adi, soyadi)',cw-2500-1500-3000-500,false,true),
            ]}),
          ]
        }),

        new D.Paragraph({spacing:{before:300}, children:[]}),
        new D.Paragraph({spacing:{after:60}, children:[
          new D.TextRun({text:'Qeyd. ',bold:true,size:18,font:'Times New Roman'}),
          new D.TextRun({text:'1.Sifaris tesdiq ucun buraxilisa icaze verme selahiyyetine malik olan vezifeli sexse, icra ucun ise "socar.reception" unvanina gonderilmelidir.',size:18,font:'Times New Roman'}),
        ]}),
        new D.Paragraph({children:[
          new D.TextRun({text:'2. 4-cu sutun qonagin "SOCAR-Tower"-in erazisine avtomobille daxil olacagi teqdirde doldurulmalidir.',size:18,font:'Times New Roman'}),
        ]}),
      ]
    }]
  });

  var blob = await D.Packer.toBlob(doc);
  return blob;
}

async function sendAll() {
  var btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Hazirlanir...';

  try {
    var guests = getActiveGuests();
    var meta = getFormMeta();
    var recipient = document.getElementById('fRecipient').value;

    var blob = await generateForma1Docx(guests, meta);

    var reader = new FileReader();
    reader.onloadend = function() {
      var base64 = reader.result.split(',')[1];

      try {
        Office.context.mailbox.displayNewMessageFormAsync({
          toRecipients: [recipient],
          subject: 'Buraxilis sifarisi - ' + meetingData.subject + ' (' + meta.period + ')',
          htmlBody: buildEmailHtml(guests, meta),
          attachments: [{
            type: Office.MailboxEnums.AttachmentType.File,
            name: 'forma1_buraxilis.docx',
            url: 'data:application/vnd.openxmlformats-officedocument.wordprocessingml.document;base64,' + base64,
            isInline: false
          }]
        }, function(result) {
          if (result.status === Office.AsyncResultStatus.Failed) {
            fallbackSend(blob, recipient, meta);
          }
          showDone(guests.length, recipient);
        });
      } catch(e) {
        saveAs(blob, 'forma1_buraxilis.docx');
        showDone(guests.length, recipient);
      }
    };
    reader.readAsDataURL(blob);

  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = 'Gonder + Forma 1';
    showStatus('err', 'Xeta: ' + err.message);
  }
}

function fallbackSend(blob, recipient, meta) {
  saveAs(blob, 'forma1_buraxilis.docx');
  var subject = encodeURIComponent('Buraxilis sifarisi - ' + meetingData.subject + ' (' + meta.period + ')');
  var body = encodeURIComponent('Hormetli hemkarlar,\n\nQosmadaki hemkarlarin Bas Ofise buraxilisi ile bagli desteyinizi xahis edirik.\n\nHormetle,\n' + meta.contact);
  window.open('mailto:' + recipient + '?subject=' + subject + '&body=' + body);
}

function showDone(count, recipient) {
  document.getElementById('doneMsg').innerHTML =
    'Forma 1 (' + count + ' nefer) Word formatinda<br><b>' + esc(recipient) + '</b> unvanina gonderildi.';
  showStep(4);
}

function showStatus(type, msg) {
  var bar = document.getElementById('statusBar');
  bar.className = 'status ' + (type === 'err' ? 'err' : 'ok');
  bar.textContent = msg;
  bar.classList.remove('hidden');
}

function resetAll() {
  selectedIds = new Set(attendees.map(function(a) { return a.id; }));
  showStep(0);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
